<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu - TENG</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-100 text-gray-800 font-['Inter'] min-h-screen flex flex-col"
  >
    <header
      class="bg-blue-900 text-white h-16 flex justify-between items-center px-8 shadow-md relative z-30"
    >
      <div class="flex items-center gap-8">
        <a
          href="/User/index.html"
          class="font-bold text-3xl flex items-center gap-2 text-white hover:text-blue-200 transition"
        >
          <i class="fa-solid fa-graduation-cap"></i> TENG
        </a>
      </div>
      <div class="flex items-center gap-6">
        <button
          onclick="window.location.href = '/User/course-details.html'"
          class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full text-sm font-semibold transition shadow"
        >
          Bắt đầu học
        </button>

        <div class="relative inline-block text-left z-50 group">
          <div
            class="w-10 h-10 bg-blue-600 text-white rounded-full flex justify-center items-center cursor-pointer shadow-lg hover:scale-105 transition text-sm border-2 border-transparent hover:border-blue-300"
          >
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="absolute right-0 top-10 w-full h-6 bg-transparent"></div>
          <div
            id="userDropdownMenu"
            class="absolute right-0 top-[calc(100%+0.5rem)] w-56 bg-white rounded-2xl shadow-[0_15px_50px_rgba(0,0,0,0.15)] border border-gray-100 py-3 opacity-0 invisible group-hover:opacity-100 group-hover:visible transform scale-95 group-hover:scale-100 transition-all duration-200 origin-top-right z-50"
          >
            <div class="px-5 py-2 border-b border-gray-100 mb-2">
              <p class="text-sm font-black text-blue-900">Học viên TENG</p>
            </div>
            <a
              href="/User/profile.html"
              class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
              ><i class="fa-solid fa-address-card text-lg w-5"></i> Trang cá
              nhân</a
            >
            <a
              href="/User/course-details.html"
              class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
              ><i class="fa-solid fa-book-open text-lg w-5"></i> Khóa học của
              tôi</a
            >
            <div class="h-px bg-gray-200 my-2"></div>
            <a
              href="/User/index.html"
              class="w-full text-left flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition"
              ><i class="fa-solid fa-arrow-right-from-bracket text-lg w-5"></i>
              Đăng xuất</a
            >
          </div>
        </div>
      </div>
    </header>

    <div class="flex-1 flex justify-center py-10 px-4 relative z-10">
      <main class="w-full max-w-3xl bg-white rounded-2xl shadow-sm p-8 h-fit">
        <div class="flex gap-6 border-b border-gray-200 mb-8 pb-3">
          <a
            href="/User/profile.html"
            class="text-gray-500 font-medium hover:text-gray-800 pb-3 -mb-[13px]"
            >Hồ sơ</a
          >
          <a
            href="/User/profile.html"
            class="text-blue-600 font-semibold border-b-2 border-blue-600 pb-3 -mb-[13px]"
            >Đổi mật khẩu</a
          >
        </div>

        <div class="flex flex-col items-center max-w-md mx-auto w-full">
          <div
            class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex justify-center items-center text-2xl mb-8"
          >
            <i class="fa-solid fa-lock"></i>
          </div>
          <form class="w-full flex flex-col gap-5">
            <div class="flex flex-col gap-2 relative">
              <label class="text-sm font-medium text-gray-600"
                >Mật khẩu cũ</label
              >
              <input
                type="password"
                id="oldPwd"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none pr-10 focus:ring-2 focus:ring-blue-500 transition"
              />
              <i
                class="fa-regular fa-eye absolute right-4 top-[38px] text-gray-400 cursor-pointer hover:text-gray-600"
                onclick="togglePassword('oldPwd', this)"
              ></i>
            </div>
            <div class="flex flex-col gap-2 relative">
              <label class="text-sm font-medium text-gray-600"
                >Mật khẩu mới</label
              >
              <input
                type="password"
                id="newPwd"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none pr-10 focus:ring-2 focus:ring-blue-500 transition"
              />
              <i
                class="fa-regular fa-eye absolute right-4 top-[38px] text-gray-400 cursor-pointer hover:text-gray-600"
                onclick="togglePassword('newPwd', this)"
              ></i>
            </div>
            <div class="flex flex-col gap-2 relative mb-2">
              <label class="text-sm font-medium text-gray-600"
                >Xác nhận mật khẩu</label
              >
              <input
                type="password"
                id="confirmPwd"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none pr-10 focus:ring-2 focus:ring-blue-500 transition"
              />
              <i
                class="fa-regular fa-eye absolute right-4 top-[38px] text-gray-400 cursor-pointer hover:text-gray-600"
                onclick="togglePassword('confirmPwd', this)"
              ></i>
            </div>
            <ul class="text-[13px] text-gray-500 flex flex-col gap-2 mb-2">
              <li>
                <i class="fa-solid fa-check text-gray-400 mr-2 w-3"></i> Mật
                khẩu trong khoảng 8-50 ký tự
              </li>
              <li>
                <i class="fa-solid fa-check text-gray-400 mr-2 w-3"></i> Mật
                khẩu bắt buộc gồm chữ và số
              </li>
            </ul>
            <button
              type="button"
              disabled
              class="w-full bg-gray-100 text-gray-400 font-semibold py-3 rounded-xl cursor-not-allowed mt-2 transition"
            >
              Lưu
            </button>
          </form>
        </div>
      </main>
    </div>

    <script>
      function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }
    </script>
  </body>
</html>
