<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Khoá học của tôi - TENG</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/course-detals.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 flex min-h-screen text-gray-800">
    <aside
      class="w-20 bg-white border-r border-gray-200 flex flex-col items-center py-6 fixed h-full z-10"
    >
      <div
        class="mb-10 text-gray-400 cursor-pointer text-xl hover:text-gray-600 transition-colors"
      >
        <i class="fa-solid fa-bars"></i>
      </div>
      <nav class="flex flex-col space-y-6 flex-1 w-full px-4">
        <div
          class="bg-blue-50 text-blue-600 w-full h-12 flex items-center justify-center rounded-xl cursor-pointer text-xl"
        >
          <i class="fa-solid fa-book-open"></i>
        </div>
        <div
          class="text-gray-400 w-full h-12 flex items-center justify-center rounded-xl hover:bg-gray-100 hover:text-gray-600 cursor-pointer text-xl transition-colors"
        >
          <i class="fa-regular fa-file-lines"></i>
        </div>
      </nav>
      <div
        class="text-gray-400 p-3 cursor-pointer text-xl hover:text-gray-600 transition-colors mt-auto"
      >
        <i class="fa-solid fa-arrow-right-to-bracket fa-rotate-180"></i>
      </div>
    </aside>

    <main class="flex-1 ml-20 bg-white min-h-screen">
      <header
        class="w-full flex justify-between items-center px-12 py-4 gap-6 border-b border-gray-100 relative z-30"
      >
        <a
          href="../User/index.html"
          class="font-bold text-3xl flex items-center gap-2 text-blue-600 hover:text-blue-700 transition"
          ><i class="fa-solid fa-graduation-cap"></i> TENG</a
        >

        <div class="flex items-center gap-6">
          <div
            class="text-gray-400 cursor-pointer relative hover:text-gray-600"
          >
            <i class="fa-solid fa-bell text-xl"></i
            ><span
              class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full border-2 border-white"
            ></span>
          </div>

          <div class="relative inline-block text-left z-50 group">
            <div
              class="w-10 h-10 bg-blue-600 text-white rounded-full flex justify-center items-center cursor-pointer shadow-lg hover:scale-105 transition text-sm border-2 border-transparent hover:border-blue-300"
            >
              <i class="fa-solid fa-user"></i>
            </div>
            <div
              class="absolute right-0 top-10 w-full h-6 bg-transparent"
            ></div>
            <div
              class="absolute right-0 top-[calc(100%+0.5rem)] w-56 bg-white rounded-2xl shadow-[0_15px_50px_rgba(0,0,0,0.15)] border border-gray-100 py-3 opacity-0 invisible group-hover:opacity-100 group-hover:visible transform scale-95 group-hover:scale-100 transition-all duration-200 origin-top-right z-50"
            >
              <div class="px-5 py-2 border-b border-gray-100 mb-2">
                <p class="text-sm font-black text-blue-900">Học viên TENG</p>
              </div>
              <a
                href="../User/profile.html"
                class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
                ><i class="fa-solid fa-address-card text-lg w-5"></i> Trang cá
                nhân</a
              >
              <a
                href="../User/course-details.html"
                class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
                ><i class="fa-solid fa-book-open text-lg w-5"></i> Khóa học của
                tôi</a
              >
              <div class="h-px bg-gray-200 my-2"></div>
              <a
                href="../User/index.html"
                class="w-full text-left flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition"
                ><i
                  class="fa-solid fa-arrow-right-from-bracket text-lg w-5"
                ></i>
                Đăng xuất</a
              >
            </div>
          </div>
        </div>
      </header>

      <div class="px-16 pt-10 pb-16 max-w-7xl mx-auto relative z-10">
        <div
          class="flex justify-between items-center border-b border-gray-100 pb-6 mb-10"
        >
          <h1 class="text-3xl font-bold text-gray-900">Khoá học của tôi</h1>
        </div>

        <div id="courseWrapper"></div>
      </div>
    </main>
    <script src="../assets/js/course-details.js"></script>
  </body>
</html>
