<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết chương - TENG</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/grammar.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 flex min-h-screen text-gray-800 font-['Inter']">
    <aside
      class="w-16 bg-white border-r border-gray-200 flex flex-col items-center py-6 fixed h-full z-10 shadow-sm"
    >
      <div
        class="mb-10 text-gray-400 cursor-pointer text-lg hover:text-gray-600"
      >
        <i class="fa-solid fa-bars"></i>
      </div>

      <nav class="flex flex-col space-y-6 flex-1 w-full px-3">
        <div
          class="bg-blue-50 text-blue-600 w-full h-10 flex items-center justify-center rounded-lg cursor-pointer text-lg"
        >
          <i class="fa-solid fa-book-open"></i>
        </div>
        <div
          class="text-gray-400 w-full h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 cursor-pointer text-lg"
        >
          <i class="fa-regular fa-file-lines"></i>
        </div>
      </nav>

      <div
        class="text-gray-400 mt-auto cursor-pointer text-lg hover:text-gray-600"
      >
        <i class="fa-solid fa-arrow-right-to-bracket fa-rotate-180"></i>
      </div>
    </aside>

    <div class="flex-1 ml-16 flex flex-col">
      <header
        class="h-16 flex justify-between items-center px-10 gap-6 border-b border-gray-200 bg-white sticky top-0 z-30"
      >
        <a
          href="index.html"
          class="font-bold text-3xl flex items-center gap-2 text-blue-600 hover:text-blue-700 transition"
        >
          <i class="fa-solid fa-graduation-cap"></i> TENG
        </a>

        <div class="flex items-center gap-6">
          <i
            class="fa-solid fa-bell text-gray-400 text-xl cursor-pointer hover:text-gray-600"
          ></i>

          <div class="relative inline-block text-left z-50 group">
            <div
              class="w-8 h-8 bg-blue-600 text-white rounded-full flex justify-center items-center cursor-pointer shadow-lg hover:scale-105 transition text-xs border-2 border-transparent hover:border-blue-300"
            >
              <i class="fa-solid fa-user"></i>
            </div>
            <div class="absolute right-0 top-8 w-full h-6 bg-transparent"></div>
            <div
              class="absolute right-0 top-[calc(100%+0.5rem)] w-56 bg-white rounded-2xl shadow-[0_15px_50px_rgba(0,0,0,0.15)] border border-gray-100 py-3 opacity-0 invisible group-hover:opacity-100 group-hover:visible transform scale-95 group-hover:scale-100 transition-all duration-200 origin-top-right z-50"
            >
              <div class="px-5 py-2 border-b border-gray-100 mb-2">
                <p class="text-sm font-black text-blue-900">Học viên TENG</p>
              </div>
              <a
                href="profile.html"
                class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
              >
                <i class="fa-solid fa-address-card text-lg w-5"></i> Trang cá nhân
              </a>
              <a
                href="course-details.html"
                class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
              >
                <i class="fa-solid fa-book-open text-lg w-5"></i> Khóa học của tôi
              </a>
              <div class="h-px bg-gray-200 my-2"></div>
              <a
                href="index.html"
                class="w-full text-left flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition"
              >
                <i class="fa-solid fa-arrow-right-from-bracket text-lg w-5"></i>
                Đăng xuất
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="px-10 lg:px-20 py-8 max-w-5xl mx-auto w-full relative z-10">
        <section
          class="flex flex-col md:flex-row justify-between items-center gap-10 mb-10"
        >
          <div class="flex-1">
            <h1 id="chapterTitle" class="text-3xl font-extrabold mb-3 text-gray-900">
              Đang tải...
            </h1>
            <p id="chapterDescription" class="text-gray-500 leading-relaxed text-sm">
              Đang tải mô tả...
            </p>
          </div>
        </section>

        <section>
          <div
            class="flex justify-between items-center border-b border-gray-300 pb-3 mb-6"
          >
            <h2 class="font-bold text-lg text-gray-800">Danh sách bài học</h2>
            <span id="chapterProgress" class="text-sm text-gray-400 font-medium">
              Đang tải...
            </span>
          </div>

          <div id="lessonList" class="flex flex-col gap-4"></div>
        </section>
      </main>

      <footer class="bg-white border-t border-gray-200 py-6 mt-auto">
        <div
          class="max-w-6xl mx-auto px-10 text-center text-sm text-gray-500 font-medium"
        >
          &copy; 2024 TENG Project. Developed with
          <i class="fa-solid fa-heart text-red-500 mx-1"></i> by Team: Duy,
          Mạnh, Thắng - 64K CNTT CLC Đại học Vinh.
        </div>
      </footer>
    </div>

    <script src="/assets/js/chapter-detail.js"></script>
  </body>
</html>
